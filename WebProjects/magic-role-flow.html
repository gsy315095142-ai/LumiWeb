<!-- 完整流程总览（从 magic-role.html 拆分） -->
<div class="section-block">
      <div class="section-title">
        <div class="section-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        完整流程总览
      </div>

      <div class="flow-steps">
        <div class="flow-step">
          <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
          <div class="flow-content">
            <h4>用户预约并支付</h4>
            <p>在预约页选场次 → 确认页选票券 → 支付 → 获得订单（含 6 位激活码）。</p>
          </div>
        </div>
        <div class="flow-step">
          <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
          <div class="flow-content">
            <h4>到达现场扫码</h4>
            <p>用户到达门店，在订单页点击扫码，扫描现场签到码进入激活码页面。</p>
          </div>
        </div>
        <div class="flow-step">
          <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
          <div class="flow-content">
            <h4>输入激活码</h4>
            <p>在激活码页输入 6 位数字（或点击已有订单自动填入），点击激活。</p>
          </div>
        </div>
        <div class="flow-step">
          <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
          <div class="flow-content">
            <h4>创建角色</h4>
            <p>为每个位置选择性别形象、命名角色。支持随机取名。确认提交。</p>
          </div>
        </div>
        <div class="flow-step">
          <div class="flow-line"><div class="flow-dot"></div></div>
          <div class="flow-content">
            <h4>等待场次开启</h4>
            <p>显示倒计时，可随时修改角色。倒计时归零后等待工作人员开启场次。</p>
          </div>
        </div>
      </div>
    </div>
