  <div class="feature-card">
    <h4>什么是团票</h4>
    <p>团票（GROUP_TICKET）是一种支持多人同时预约的特殊票券类型。购买后获得一个 <code>group_code</code>，团长和团员通过该码进入占位页面，自助分配各场次的角色位置。</p>
  </div>

  <div class="feature-card">
    <h4>入口方式</h4>
    <table class="info-table">
      <thead><tr><th>入口</th><th>说明</th></tr></thead>
      <tbody>
        <tr><td><span class="status-tag purple">小程序页面</span></td><td>跳转 <code>/pages/groupTeam/groupTeam?group_code=xxx</code></td></tr>
        <tr><td><span class="status-tag blue">扫码</span></td><td>扫描团票二维码 → <code>vouchersShareJump</code> → 携带 <code>group_code</code> 跳转</td></tr>
        <tr><td><span class="status-tag green">分享链接</span></td><td>团队成员通过微信分享链接进入</td></tr>
        <tr><td><span class="status-tag orange">中控台</span></td><td>管理端场次详情中查看团队占位</td></tr>
      </tbody>
