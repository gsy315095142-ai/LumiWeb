<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #7C3AED; --primary-light: #A78BFA; --accent: #FBBF24;
  --bg-dark: #0F0A1A; --bg-card: rgba(255,255,255,0.04); --bg-card-hover: rgba(255,255,255,0.06);
  --text-primary: #F8FAFC; --text-secondary: rgba(248,250,252,0.6); --text-tertiary: rgba(248,250,252,0.4);
  --card-border: rgba(255,255,255,0.08); --card-border-hover: rgba(255,255,255,0.14);
  --project-color: #7C3AED; --project-color-light: #A78BFA;
  --project-color-bg: rgba(124,58,237,0.1); --project-color-border: rgba(124,58,237,0.2);
}
body { font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg-dark); color:var(--text-primary); min-height:100vh; overflow-x:hidden; position:relative; }
.bg-glow { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; }
.glow-orb { position:absolute; border-radius:50%; filter:blur(80px); animation:pulse 8s ease-in-out infinite alternate; }
.glow-orb-1 { width:400px; height:400px; background:rgba(124,58,237,0.08); top:-100px; left:-100px; }
.glow-orb-2 { width:300px; height:300px; background:rgba(251,191,36,0.05); bottom:-50px; right:-50px; animation-delay:4s; }
@keyframes pulse { 0%{transform:scale(1);opacity:0.5;} 100%{transform:scale(1.3);opacity:1;} }
.container { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 24px; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:28px 0 20px; animation:fadeInDown .6s ease; }
.back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; transition:color .3s; }
.back-link:hover { color:var(--text-primary); }
.back-link svg { width:18px; height:18px; transition:transform .3s; }
.back-link:hover svg { transform:translateX(-3px); }




.page-header { padding:20px 0 40px; animation:fadeInUp .8s ease .1s both; }
.page-header-top { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
.page-num { font-size:13px; font-weight:700; color:var(--project-color-light); background:var(--project-color-bg); padding:4px 12px; border-radius:6px; letter-spacing:1px; }
.tag-admin { font-size:12px; font-weight:600; color:#FBBF24; background:rgba(251,191,36,0.1); padding:4px 10px; border-radius:6px; border:1px solid rgba(251,191,36,0.2); }
.page-header h1 { font-size:32px; font-weight:800; letter-spacing:-.5px; }
.page-header-desc { font-size:15px; color:var(--text-secondary); line-height:1.7; max-width:600px; }
.content { padding-bottom:80px; }
.section-block { margin-bottom:48px; animation:fadeInUp .8s ease both; }
.section-block-sep::after { content:""; display:block; height:1px; margin-top:48px; background:linear-gradient(to right,transparent,rgba(255,255,255,.06),transparent); }
.section-block:nth-child(1){animation-delay:.2s;} .section-block:nth-child(2){animation-delay:.35s;}
.section-block:nth-child(3){animation-delay:.5s;} .section-block:nth-child(4){animation-delay:.65s;}
.section-block:nth-child(5){animation-delay:.8s;} .section-block:nth-child(6){animation-delay:.95s;}
.section-block:nth-child(7){animation-delay:1.1s;} .section-block:nth-child(8){animation-delay:1.25s;}
.section-block:nth-child(9){animation-delay:1.4s;}
.section-title { font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.section-title-icon { width:28px; height:28px; border-radius:8px; background:var(--project-color-bg); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.section-title-icon svg { width:16px; height:16px; color:var(--project-color-light); }
.feature-card { background:var(--bg-card); border:1px solid var(--card-border); border-radius:14px; padding:24px; margin-bottom:12px; transition:all .3s; }
.feature-card:hover { background:var(--bg-card-hover); border-color:var(--card-border-hover); }
.feature-card h4 { font-size:15px; font-weight:600; margin-bottom:8px; color:var(--text-primary); }
.feature-card p { font-size:14px; color:var(--text-secondary); line-height:1.7; }
.flow-steps { display:flex; flex-direction:column; gap:0; }
.flow-step { display:flex; gap:16px; position:relative; }
.flow-line { display:flex; flex-direction:column; align-items:center; width:32px; flex-shrink:0; }
.flow-dot { width:12px; height:12px; border-radius:50%; background:var(--primary); border:2px solid var(--project-color-light); flex-shrink:0; position:relative; z-index:1; }
.flow-connector { width:2px; flex:1; min-height:20px; background:linear-gradient(to bottom,var(--project-color-border),transparent); }
.flow-content { padding-bottom:24px; flex:1; }
.flow-content h4 { font-size:14px; font-weight:600; margin-bottom:6px; }
.flow-content p { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.detail-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.detail-list li { font-size:14px; color:var(--text-secondary); line-height:1.6; padding-left:20px; position:relative; }
.detail-list li::before { content:''; position:absolute; left:0; top:9px; width:6px; height:6px; border-radius:50%; background:var(--project-color-light); opacity:.6; }
code { background:rgba(124,58,237,.12); color:var(--project-color-light); padding:2px 6px; border-radius:4px; font-size:13px; font-family:"SF Mono","Consolas","Courier New",monospace; }
.tip-box { background:rgba(124,58,237,.06); border:1px solid var(--project-color-border); border-radius:12px; padding:16px 20px; margin-top:16px; }
.tip-box-title { font-size:13px; font-weight:600; color:var(--project-color-light); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.tip-box p { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.info-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
.info-table th,.info-table td { color:var(--text-secondary); }
.info-table tbody tr:nth-child(even) td { background:rgba(255,255,255,.02); }
.info-table tbody tr:hover td { background:rgba(124,58,237,.06); transition:background .2s; }
.info-table th { font-weight:600; color:var(--project-color-light); background:rgba(124,58,237,.04); }
.info-table td { color:var(--text-secondary); }
.status-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.status-tag { font-size:12px; padding:4px 12px; border-radius:100px; font-weight:500; }
.status-tag.blue { background:rgba(59,130,246,.1); color:#93C5FD; border:1px solid rgba(59,130,246,.2); }
.status-tag.green { background:rgba(16,185,129,.1); color:#6EE7B7; border:1px solid rgba(16,185,129,.2); }
.status-tag.orange { background:rgba(251,191,36,.1); color:#FBBF24; border:1px solid rgba(251,191,36,.2); }
.status-tag.red { background:rgba(239,68,68,.1); color:#FCA5A5; border:1px solid rgba(239,68,68,.2); }
.status-tag.purple { background:rgba(124,58,237,.1); color:#A78BFA; border:1px solid rgba(124,58,237,.2); }
.status-tag.grey { background:rgba(255,255,255,.05); color:var(--text-tertiary); border:1px solid rgba(255,255,255,.1); }
.status-tag.cyan { background:rgba(6,182,212,.1); color:#67E8F9; border:1px solid rgba(6,182,212,.2); }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .two-col{grid-template-columns:1fr;} }
.sub-card { background:rgba(255,255,255,0.02); border:1px solid var(--card-border); border-radius:10px; padding:16px; }
.sub-card h5 { font-size:13px; font-weight:600; color:var(--project-color-light); margin-bottom:8px; }
.sub-card p,.sub-card li { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.sub-card ul { list-style:none; display:flex; flex-direction:column; gap:4px; }
.sub-card li { padding-left:16px; position:relative; }
.sub-card li::before { content:''; position:absolute; left:0; top:8px; width:4px; height:4px; border-radius:50%; background:var(--project-color-light); opacity:.5; }
.page-nav { display:flex; justify-content:space-between; align-items:center; padding:32px 0; border-top:1px solid var(--card-border); animation:fadeInUp .8s ease .8s both; }
.page-nav-link { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text-secondary); transition:color .3s; max-width:45%; }
.page-nav-link:hover { color:var(--text-primary); }
.page-nav-link.next { text-align:right; margin-left:auto; }
.page-nav-link svg { width:18px; height:18px; flex-shrink:0; }
.page-nav-info { display:flex; flex-direction:column; }
.page-nav-label { font-size:12px; color:var(--text-tertiary); margin-bottom:2px; }
.page-nav-title { font-size:14px; font-weight:600; color:var(--project-color-light); }
.page-nav-link:hover .page-nav-title { color:var(--text-primary); }
.footer { text-align:center; padding:20px 0 40px; }
.footer-text { font-size:13px; color:var(--text-secondary); opacity:.5; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeInDown { from{opacity:0;transform:translateY(-15px);} to{opacity:1;transform:translateY(0);} }

/* === 导航栏下拉菜单 === */
.topbar-nav { display:flex; gap:8px; position:relative; }
.nav-group { position:relative; }
.nav-group-btn {
  padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500;
  text-decoration:none; color:var(--text-secondary); border:1px solid transparent;
  display:flex; align-items:center; gap:5px; cursor:pointer;
  background:transparent; font-family:inherit;
  transition:all .2s;
}
.nav-group-btn:hover { color:var(--text-primary); background:var(--bg-card-hover); border-color:var(--card-border-hover); }
.nav-group-btn.active-group { color:var(--project-color-light); background:var(--project-color-bg); border-color:var(--project-color-border); }
.nav-group-btn svg { width:14px; height:14px; transition:transform .2s; }
.nav-group-btn.open svg { transform:rotate(180deg); }
.nav-dropdown {
  position:absolute; top:calc(100% + 8px); right:0; min-width:140px;
  background:rgba(20,14,36,0.98); border:1px solid var(--card-border);
  border-radius:12px; padding:6px; z-index:200;
  opacity:0; visibility:hidden; transform:translateY(-8px);
  transition:all .2s; backdrop-filter:blur(12px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.nav-dropdown.open { opacity:1; visibility:visible; transform:translateY(0); }
.nav-dropdown a {
  display:block; padding:8px 14px; border-radius:8px; font-size:13px;
  text-decoration:none; color:var(--text-secondary); font-weight:500;
  transition:all .15s;
}
.nav-dropdown a:hover { color:var(--text-primary); background:var(--bg-card-hover); }
.nav-dropdown a.current { color:var(--project-color-light); background:var(--project-color-bg); }

/* 响应式：小屏下拉靠左 */
@media (max-width: 600px) {
  .nav-dropdown { right:auto; left:0; }
}

/* === TOC 目录 === */
.toc-float {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 70vh;
  overflow-y: auto;
  padding: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.toc-float.visible { opacity: 1; pointer-events: auto; }
.toc-float::-webkit-scrollbar { width: 2px; }
.toc-float::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.toc-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.toc-dot:hover { background: rgba(255,255,255,0.3); transform: scale(1.3); }
.toc-dot.active { background: var(--primary-light); transform: scale(1.4); box-shadow: 0 0 8px rgba(167,139,250,0.4); }
.toc-dot::after {
  content: attr(data-title);
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  background: rgba(15,10,26,0.95);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  border: 1px solid var(--card-border);
}
.toc-dot:hover::after { opacity: 1; }

/* === 回到顶部 === */
.back-top {
  position: fixed;
  bottom: 32px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--bg-card);
  border: 1px solid var(--card-border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  z-index: 100;
}
.back-top.visible { opacity: 1; pointer-events: auto; }
.back-top:hover { background: var(--bg-card-hover); color: var(--text-primary); transform: translateY(-2px); }
.back-top svg { width: 20px; height: 20px; }

</style>

<script>
// === TOC: 给 section 加 id ===
(function(){
  var sections = document.querySelectorAll(".section-block");
  sections.forEach(function(s, i){ s.id = "sec-" + i; });

  // Build TOC dots
  var toc = document.getElementById("toc-float");
  if (!toc || sections.length === 0) return;
  sections.forEach(function(s, i){
    var titleEl = s.querySelector(".section-title");
    if (!titleEl) return;
    var title = titleEl.textContent.trim().substring(0, 20);
    var dot = document.createElement("div");
    dot.className = "toc-dot";
    dot.setAttribute("data-title", title);
    dot.onclick = function(){ s.scrollIntoView({ behavior: "smooth", block: "start" }); };
    toc.appendChild(dot);
  });
  var dots = toc.querySelectorAll(".toc-dot");

  // Show TOC on scroll
  var backTop = document.getElementById("back-top");
  window.addEventListener("scroll", function(){
    var scrolled = window.scrollY > 200;
    toc.classList.toggle("visible", scrolled);
    if (backTop) backTop.classList.toggle("visible", scrolled);

    // Highlight active section
    var current = -1;
    sections.forEach(function(s, i){
      var rect = s.getBoundingClientRect();
      if (rect.top < window.innerHeight / 3) current = i;
    });
    dots.forEach(function(d, i){ d.classList.toggle("active", i === current); });
  });

  // Back to top
  if (backTop) backTop.onclick = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
})();
</script>

<script>
// === Nav dropdown ===
(function(){
  var groups = document.querySelectorAll(".nav-group");
  groups.forEach(function(g){
    var btn = g.querySelector(".nav-group-btn");
    var dd = g.querySelector(".nav-dropdown");
    btn.addEventListener("click", function(e){
      e.stopPropagation();
      var isOpen = dd.classList.contains("open");
      // Close all
      groups.forEach(function(g2){
        g2.querySelector(".nav-dropdown").classList.remove("open");
        g2.querySelector(".nav-group-btn").classList.remove("open");
      });
      if (!isOpen) { dd.classList.add("open"); btn.classList.add("open"); }
    });
  });
  document.addEventListener("click", function(){
    groups.forEach(function(g){
      g.querySelector(".nav-dropdown").classList.remove("open");
      g.querySelector(".nav-group-btn").classList.remove("open");
    });
  });
})();
</script>
