<!-- 左滑交互机制（从 magic-user.html 拆分） -->
<div class="section-block">
  <div class="section-title">
    <div class="section-title-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
    左滑交互机制
  </div>

  <div class="feature-card">
    <h4>触发条件</h4>
    <p>用户在场次/票券列表中左滑可触发操作按钮：</p>
    <ul class="detail-list" style="margin-top:8px;">
      <li><strong>水平阈值</strong>：X 轴左滑超过 100px 时激活，右滑超过 20px 时关闭</li>
      <li><strong>垂直过滤</strong>：Y 轴移动距离 > X 轴时判定为垂直滚动，不触发左滑</li>
      <li><strong>平台限制</strong>：仅 <code>platform=lumi</code>（内部票券）的票券支持左滑操作</li>
      <li><strong>互斥</strong>：同时只允许一个卡片处于展开状态</li>
    </ul>
  </div>

  <div class="feature-card">
    <h4>可用操作</h4>
    <table class="info-table">
      <thead><tr><th>列表</th><th>左滑操作</th><th>说明</th></tr></thead>
      <tbody>
        <tr><td>场次列表</td><td>撤销场次</td><td>开场前 3h+ 可撤销，调用 cancelGameRoundOrder</td></tr>
        <tr><td>票券列表</td><td>退票</td><td>调用 refundCouponWithPayOrder，不可撤销</td></tr>
      </tbody>
    </table>
  </div>
</div>
