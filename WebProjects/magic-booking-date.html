<!-- 日期选择（从 magic-booking.html 拆分） -->
<div class="section-block">
      <div class="section-title">
        <div class="section-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        日期选择
      </div>

      <div class="feature-card">
        <h4>可选日期范围</h4>
        <p>使用微信原生 <code>picker</code> 组件（mode="date"）选择日期。日期范围限制为：</p>
        <ul class="detail-list" style="margin-top: 8px;">
          <li><strong>起始日期</strong>：当天</li>
          <li><strong>结束日期</strong>：当天 + 3 天（共可选 4 天）</li>
        </ul>
      </div>

      <div class="feature-card">
        <h4>日期切换联动</h4>
        <p>选择新日期后：</p>
        <ul class="detail-list" style="margin-top: 8px;">
          <li>调用 <code>/mz/getGameRoundList</code> 获取该日期的所有场次</li>
          <li>清空已选时间、已选场次、推荐列表</li>
          <li>重新生成时间段列表</li>
          <li>页面显示对应的星期几</li>
        </ul>
      </div>

      <div class="tip-box">
        <div class="tip-box-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          打点记录
        </div>
        <p>新建预约进入此页面时，会记录页面日志「预约选择时间」（<code>pageRecordLogChange</code>），同时记录进入时间戳 <code>bookStartTime</code>，用于后续统计预约转化时长。</p>
      </div>
    </div>
