<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi 魔法学院 - 项目文档</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #7C3AED;
  --primary-dark: #5B21B6;
  --primary-light: #A78BFA;
  --accent: #FBBF24;
  --bg-dark: #0F0A1A;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.06);
  --text-primary: #F8FAFC;
  --text-secondary: rgba(248,250,252,0.6);
  --text-tertiary: rgba(248,250,252,0.4);
  --card-border: rgba(255,255,255,0.08);
  --card-border-hover: rgba(255,255,255,0.14);
}

body {
  font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

.bg-glow {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

.glow-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: pulse 8s ease-in-out infinite alternate;
}

.glow-orb-1 {
  width: 400px; height: 400px;
  background: rgba(124,58,237,0.08);
  top: -100px; left: -100px;
}

.glow-orb-2 {
  width: 300px; height: 300px;
  background: rgba(251,191,36,0.05);
  bottom: -50px; right: -50px;
  animation-delay: 4s;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(1.3); opacity: 1; }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 28px 0 20px;
  transition: color .3s;
}

.back-link:hover { color: var(--text-primary); }

.back-link svg {
  width: 18px; height: 18px;
  transition: transform .3s;
}

.back-link:hover svg { transform: translateX(-3px); }

.page-header {
  padding: 12px 0 48px;
  text-align: center;
  animation: fadeInUp .8s ease both;
}

.page-header-icon {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 32px rgba(124,58,237,0.3);
}

.page-header-icon svg {
  width: 36px; height: 36px;
  color: white;
}

.page-header h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.page-header-desc {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.doc-card {
  background: var(--bg-card);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 32px;
  margin-bottom: 24px;
  transition: all .3s;
  text-decoration: none;
  display: block;
  animation: fadeInUp .8s ease .2s both;
}

.doc-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--card-border-hover);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.doc-card-inner {
  display: flex;
  align-items: center;
  gap: 24px;
}

.doc-card-icon {
  width: 64px; height: 64px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(124,58,237,0.05));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.doc-card-icon svg {
  width: 28px; height: 28px;
  color: var(--primary-light);
}

.doc-card-content {
  flex: 1;
}

.doc-card-content h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}

.doc-card-content p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.doc-card-arrow {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(124,58,237,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .3s;
}

.doc-card:hover .doc-card-arrow {
  background: rgba(124,58,237,0.15);
}

.doc-card-arrow svg {
  width: 18px; height: 18px;
  color: var(--primary-light);
  transition: transform .3s;
}

.doc-card:hover .doc-card-arrow svg {
  transform: translateX(3px);
}

.doc-card-meta {
  display: flex;
  gap: 16px;
  margin-top: 10px;
}

.meta-tag {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 4px;
}

.meta-tag svg {
  width: 14px; height: 14px;
}

.footer {
  text-align: center;
  padding: 40px 0;
}

.footer-text {
  font-size: 13px;
  color: var(--text-secondary);
  opacity: .5;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .page-header h1 { font-size: 22px; }
  .doc-card { padding: 24px; }
  .doc-card-inner { gap: 16px; }
  .doc-card-icon { width: 52px; height: 52px; }
}
</style>
</head>
<body>

<div class="bg-glow">
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
</div>

<div class="container">

  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    返回首页
  </a>

  <div class="page-header">
    <div class="page-header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Lumi 魔法学院</h1>
    <p class="page-header-desc">小程序完整功能说明文档，共 11 个功能模块</p>
  </div>

  <a href="magic-home.html" class="doc-card">
    <div class="doc-card-inner">
      <div class="doc-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div class="doc-card-content">

        <div class="doc-card-meta">
          <span class="meta-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            11 个模块
          </span>
          <span class="meta-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            45+ 接口
          </span>
          <span class="meta-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            用户端 + 管理端
          </span>
        </div>
      </div>
      <div class="doc-card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </div>
  </a>

  <footer class="footer">
    <p class="footer-text">© 2026 Lumi (lumiclaw) · 探索无限可能</p>
  </footer>

</div>

</body>
</html>
