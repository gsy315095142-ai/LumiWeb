<!-- 登录架构总览（从 magic-login.html 拆分） -->
<div class="section-block">
  <div class="section-title">
    <div class="section-title-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
    </div>
    登录架构总览
  </div>

  <div class="flow-steps">
    <div class="flow-step">
      <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
      <div class="flow-content">
        <h4>应用启动（app.js → onLaunch）</h4>
        <p>小程序启动时自动调用 <code>wxLogin()</code>，静默换取 Token。用户无感知。</p>
      </div>
    </div>
    <div class="flow-step">
      <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
      <div class="flow-content">
        <h4>Token 写入本地存储</h4>
        <p>登录成功后 Token 写入 <code>access_token</code>，同时存储用户信息、门店列表、角色等。</p>
      </div>
    </div>
    <div class="flow-step">
      <div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div>
      <div class="flow-content">
        <h4>请求自动携带 Token</h4>
        <p>所有 API 请求通过 <code>requestPromise</code> 统一封装，自动在 Header 中附加 <code>Authorization: Bearer {token}</code>。</p>
      </div>
    </div>
    <div class="flow-step">
      <div class="flow-line"><div class="flow-dot"></div></div>
      <div class="flow-content">
        <h4>用户主动登录（login 页）</h4>
        <p>需要身份的操作（预约、查看订单等）触发登录页，用户填写头像昵称、授权手机号后完成登录。</p>
      </div>
    </div>
  </div>
</div>
