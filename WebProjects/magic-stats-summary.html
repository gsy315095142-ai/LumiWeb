<!-- 汇总统计卡片（从 magic-stats.html 拆分） -->
<div class="section-block">
  <div class="section-title">
    <div class="section-title-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    汇总统计卡片
  </div>

  <div class="feature-card">
    <h4>汇总统计（totalStatData）</h4>
    <p>页面第一张卡片，展示整体票券数据概览：</p>
    <div class="stat-card-visual">
      <div class="stat-card-header">📊 汇总统计</div>
      <div class="stat-card-grid">
        <div class="stat-metric">
          <div><span class="num">N</span><span class="unit">张</span></div>
          <div class="label">总订场票券 · 数量</div>
        </div>
        <div class="stat-metric">
          <div><span class="num">N</span><span class="unit">人</span></div>
          <div class="label">总订场票券 · 人数</div>
        </div>
      </div>
      <div class="stat-metrics-row">
        <div class="stat-mini">
          <div class="num">N</div>
          <div class="label">退票数</div>
        </div>
        <div class="stat-mini">
          <div class="num">N</div>
          <div class="label">过期数</div>
        </div>
      </div>
    </div>
  </div>

  <div class="feature-card">
    <h4>数据字段说明</h4>
    <table class="info-table">
      <thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead>
      <tbody>
        <tr><td><code>name</code></td><td>String</td><td>卡片标题（如「汇总统计」）</td></tr>
        <tr><td><code>nickname</code></td><td>String</td><td>票券类型描述（如「总订场票券」）</td></tr>
        <tr><td><code>ticketNum</code></td><td>Number</td><td>票券总数量（张）</td></tr>
        <tr><td><code>ticketValue</code></td><td>Number</td><td>票券对应总人数（人）</td></tr>
        <tr><td><code>refundNum</code></td><td>{label, value}</td><td>退票数据</td></tr>
        <tr><td><code>overdueNum</code></td><td>{label, value}</td><td>过期数据</td></tr>
      </tbody>
    </table>
  </div>
</div>
