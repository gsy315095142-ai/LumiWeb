<!-- 分享与激活码转赠（从 magic-order.html 拆分） -->
<div class="section-block">
  <div class="section-title">
    <div class="section-title-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </div>
    分享与激活码转赠
  </div>

  <div class="feature-card">
    <h4>分享订单</h4>
    <p>创建者可将订单分享给好友，好友点击后直接进入该订单的详情页（<code>is_owner=0</code>）。分享时自动生成分享海报：</p>
    <ul class="detail-list" style="margin-top: 8px;">
      <li>使用 Canvas 绘制海报图片</li>
      <li>包含：门店地址、预约日期、时段场次、预定人数、联系电话</li>
      <li>分享标题：「一封来自魔法学院的入学邀请函」</li>
      <li>分享路径携带 <code>share</code> 参数和门店 ID</li>
    </ul>
  </div>

  <div class="feature-card">
    <h4>转让激活码</h4>
    <p>创建者可点击「转让激活码」将角色转赠给他人。操作前会弹出确认弹窗提醒：</p>
    <ul class="detail-list" style="margin-top: 8px;">
      <li>提示转让后他人可直接激活角色并开启大空间体验</li>
      <li>建议仅在不方便到场时使用</li>
      <li>仅场次状态 &lt; 2（未开始）时可转让</li>
    </ul>
  </div>
</div>
