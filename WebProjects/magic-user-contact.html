<!-- 联系客服（从 magic-user.html 拆分） -->
<div class="section-block">
  <div class="section-title">
    <div class="section-title-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </div>
    联系客服
  </div>

  <div class="feature-card">
    <h4>拨打电话</h4>
    <p>用户中心提供「联系客服」按钮，点击后弹出操作面板：</p>
    <ul class="detail-list" style="margin-top:8px;">
      <li><strong>已选门店</strong>：拨打当前门店的客服电话（<code>placeLists[storeId].phone</code>）</li>
      <li><strong>未选门店</strong>：拨打默认客服电话（<code>service_phone</code>）</li>
      <li><strong>无号码</strong>：提示「无客服信息」</li>
      <li>通过 <code>wx.makePhoneCall</code> 发起通话</li>
    </ul>
  </div>
</div>
