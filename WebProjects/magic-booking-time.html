<!-- 时间段选择（从 magic-booking.html 拆分） -->
<div class="section-block">
      <div class="section-title">
        <div class="section-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        时间段选择
      </div>

      <div class="feature-card">
        <h4>时间段生成规则</h4>
        <p>根据当天场次的营业时间范围，以 30 分钟为间隔生成时间段列表：</p>
        <ul class="detail-list" style="margin-top: 8px;">
          <li>从当天第一场次的开始时间到最晚场次时间，按 00/30 分生成</li>
          <li>如果选择的是今天，自动跳过已过去的时间段</li>
          <li>使用微信原生 <code>picker</code>（mode="time"）选择时间</li>
        </ul>
      </div>

      <div class="feature-card">
        <h4>时间选择后联动</h4>
        <p>选定时间后，系统根据时间点 + 人数，从所有场次中筛选并推荐最多 4 个最匹配的场次（详见下方推荐算法）。</p>
      </div>
    </div>
