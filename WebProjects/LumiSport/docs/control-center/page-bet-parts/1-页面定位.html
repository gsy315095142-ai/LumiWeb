<div class="card">
    <h2><span class="icon">📖</span>页面定位</h2>
    <p style="color:#475569;font-size:15px;margin-bottom:16px;">
      「参与押注」是赛事从<strong style="color:#1e293b;">报名中</strong>进入<strong style="color:#1e293b;">竞猜阶段</strong>后，观众在「我要竞猜」Tab 中进行下注操作的核心环节。管理员手动开启竞猜，观众根据当前游戏类型选择对应玩法并下注。
    </p>
    <p style="color:#64748b;font-size:14px;">
      竞猜玩法根据游戏类型动态显示：<strong style="color:#1e293b;">胜负盘</strong>适用全部游戏，<strong style="color:#1e293b;">元素之王</strong>仅限冰球大师模式，<strong style="color:#1e293b;">躺平之王</strong>仅限拳击，<strong style="color:#1e293b;">精准总分</strong>和<strong style="color:#1e293b;">精准分差</strong>适用全部游戏。观众根据自身竞猜币余额选择玩法和下注金额，比赛结束后由系统自动结算。
    </p>
  </div>
