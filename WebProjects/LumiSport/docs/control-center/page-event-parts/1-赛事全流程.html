<!-- 赛事全流程（横向 6 步） -->
  <div class="card">
    <div class="card-title">🔄 赛事全流程（6 步）</div>
    <div class="flow-horizontal">
      <div class="flow-step">
        <div class="flow-step-circle">1</div>
        <span class="flow-step-icon">⚙️</span>
        <div class="flow-step-title">玩法配置</div>
        <span class="flow-step-status implemented">waiting</span>
      </div>
      <div class="flow-step">
        <div class="flow-step-circle">2</div>
        <span class="flow-step-icon">⏳</span>
        <div class="flow-step-title">等待报名</div>
        <span class="flow-step-status implemented">waiting</span>
      </div>
      <div class="flow-step">
        <div class="flow-step-circle">3</div>
        <span class="flow-step-icon">🤺</span>
        <div class="flow-step-title">报名中</div>
        <span class="flow-step-status implemented">betting</span>
      </div>
      <div class="flow-step">
        <div class="flow-step-circle">4</div>
        <span class="flow-step-icon">🎰</span>
        <div class="flow-step-title">竞猜中</div>
        <span class="flow-step-status substate">betting + 开竞猜</span>
      </div>
      <div class="flow-step">
        <div class="flow-step-circle">5</div>
        <span class="flow-step-icon">⚔️</span>
        <div class="flow-step-title">比赛中</div>
        <span class="flow-step-status implemented">started</span>
      </div>
      <div class="flow-step">
        <div class="flow-step-circle">6</div>
        <span class="flow-step-icon">🏆</span>
        <div class="flow-step-title">已结算</div>
        <span class="flow-step-status implemented">settled</span>
      </div>
    </div>
  </div>
