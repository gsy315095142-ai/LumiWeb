<!-- 三角色 × 6 步矩阵 -->
  <div class="card">
    <div class="card-title">👥 各角色在流程中的行为</div>
    <div class="role-matrix">

      <!-- 表头 -->
      <div class="matrix-header matrix-header-corner"></div>
      <div class="matrix-header"><span class="mh-icon">⚙️</span>① 玩法配置</div>
      <div class="matrix-header"><span class="mh-icon">⏳</span>② 等待报名</div>
      <div class="matrix-header"><span class="mh-icon">🤺</span>③ 报名中</div>
      <div class="matrix-header"><span class="mh-icon">🎰</span>④ 竞猜中</div>
      <div class="matrix-header"><span class="mh-icon">⚔️</span>⑤ 比赛中</div>
      <div class="matrix-header"><span class="mh-icon">🏆</span>⑥ 已结算</div>

      <!-- 管理员 -->
      <div class="matrix-role role-admin">
        <span class="role-icon">🛡️</span>
        <span class="role-name">管理员</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">选择游戏</span>
        <span class="cell-action">确认玩法</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">重选玩法</span>
        <span class="cell-action">开始报名</span>
        <span class="cell-action">返回首页</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">审核报名</span>
        <span class="cell-action">剔除选手</span>
        <span class="cell-action">开启竞猜</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">审核弹幕</span>
        <span class="cell-action rollback">剔除选手</span>
        <span class="cell-action">取消竞猜</span>
        <span class="cell-action">开始比赛</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">中止比赛</span>
      </div>
      <div class="matrix-cell role-admin">
        <span class="cell-action">再来一局</span>
        <span class="cell-action">切换游戏</span>
        <span class="cell-action">返回首页</span>
      </div>

      <!-- 选手 -->
      <div class="matrix-role role-player">
        <span class="role-icon">🎮</span>
        <span class="role-name">选手</span>
      </div>
      <div class="matrix-cell role-player empty">
        <span class="cell-action">—</span>
      </div>
      <div class="matrix-cell role-player">
        <span class="cell-action">浏览排行</span>
      </div>
      <div class="matrix-cell role-player">
        <span class="cell-action">报名参赛</span>
        <span class="cell-action">选边阵营</span>
      </div>
      <div class="matrix-cell role-player">
        <span class="cell-action">查看对手</span>
      </div>
      <div class="matrix-cell role-player">
        <span class="cell-action">比赛竞技</span>
        <span class="cell-action">实时得分</span>
      </div>
      <div class="matrix-cell role-player">
        <span class="cell-action">查看成绩</span>
        <span class="cell-action">查看排名</span>
      </div>

      <!-- 观众 -->
      <div class="matrix-role role-audience">
        <span class="role-icon">👀</span>
        <span class="role-name">观众</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">发送弹幕</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">发送弹幕</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">发送弹幕</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">下注竞猜</span>
        <span class="cell-action">查看赔率</span>
        <span class="cell-action">发送弹幕</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">观看比赛</span>
        <span class="cell-action">发送弹幕</span>
      </div>
      <div class="matrix-cell role-audience">
        <span class="cell-action">查看结果</span>
        <span class="cell-action">竞猜收益</span>
        <span class="cell-action">发送弹幕</span>
      </div>

    </div>
  </div>
